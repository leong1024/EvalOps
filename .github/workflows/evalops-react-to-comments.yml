name: "EvalOps: React to GitHub comment"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write  # to make PR
  issues: write
  pull-requests: write
  # read: to download the code review artifact
  # write: to trigger other actions
  actions: write

jobs:
  check-pr:
    if: |
      github.event.issue.pull_request &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ) &&
      (
        startsWith(github.event.comment.body, '/') ||
        startsWith(github.event.comment.body, 'evalops') ||
        startsWith(github.event.comment.body, 'ai') ||
        startsWith(github.event.comment.body, 'bot') ||
        contains(github.event.comment.body, '@evalops') ||
        contains(github.event.comment.body, '@ai') ||
        contains(github.event.comment.body, '@bot')
      )
    runs-on: ubuntu-latest
    outputs:
      is_fork: ${{ steps.pr.outputs.is_fork }}
      head_ref: ${{ steps.pr.outputs.head_ref }}
      head_repo: ${{ steps.pr.outputs.head_repo }}
    steps:
    - name: Get PR details
      id: pr
      uses: actions/github-script@v7
      with:
        script: |
          const pr = await github.rest.pulls.get({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number
          });
          const isFork = pr.data.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`;
          core.setOutput('is_fork', isFork);
          core.setOutput('head_ref', pr.data.head.ref);
          core.setOutput('head_repo', pr.data.head.repo.full_name);

  process-comment:
    needs: check-pr
    environment: ${{ needs.check-pr.outputs.is_fork == 'true' && 'external-pr' || '' }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        repository: ${{ needs.check-pr.outputs.head_repo }}
        ref: ${{ needs.check-pr.outputs.head_ref }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with: { python-version: "3.13" }

    - name: Install EvalOps
      run: |
        pip install poetry
        poetry install
        echo "$(poetry env info --path)/bin" >> $GITHUB_PATH

    - name: Run EvalOps react
      env:
        # LLM config is needed only if answer_github_comments = true in .evalops/config.toml
        # Otherwise, use LLM_API_TYPE: none
        LLM_API_TYPE: anthropic
        LLM_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        MODEL: claude-opus-4-6
        JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        JIRA_URL: ${{ secrets.JIRA_URL }}
        JIRA_USER: ${{ secrets.JIRA_USER }}
        LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        evalops react-to-comment ${{ github.event.comment.id }}
